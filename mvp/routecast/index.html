<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22RouteCast%22%2C%22short_name%22%3A%22RouteCast%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0a%22%2C%22theme_color%22%3A%22%230a0a0a%22%2C%22icons%22%3A%5B%5D%7D">
<title>RouteCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0ede8;--muted:rgba(240,237,232,0.45);
  --accent:#e8ff47;--accent-dim:rgba(232,255,71,0.12);
  --red:#ff5c5c;--blue:#5cb8ff;--green:#6ee787;--amber:#ffbf47;
  --r1:#1a73e8;--r2:#8ab4f8;--r3:#aecbfa;
  --radius:14px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:16px;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column;position:relative}

#searchbar{flex-shrink:0;background:var(--surface);padding:12px 18px 13px;display:flex;flex-direction:column;gap:8px;border-bottom:0.5px solid var(--border);z-index:30}
.field-row{display:flex;gap:8px;align-items:stretch}
.field{flex:1;display:flex;flex-direction:column;gap:4px;position:relative}
.field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.input-wrap{position:relative;display:flex;align-items:center}
.field input,.field select{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;padding:9px 12px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field input::placeholder{color:var(--muted)}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#1e1e1e}
.geo-btn{position:absolute;right:6px;background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px 6px;border-radius:6px}
.geo-btn:active{color:var(--accent)}
.sep-icon{display:flex;align-items:flex-end;padding-bottom:9px;color:var(--muted);font-size:15px;flex-shrink:0}

/* autocomplete dropdown */
.ac-list{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#1c1c1c;border:0.5px solid var(--border2);border-radius:var(--radius-sm);z-index:200;max-height:200px;overflow-y:auto;box-shadow:0 6px 22px rgba(0,0,0,0.6);display:none}
.ac-list.visible{display:block}
.ac-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--surface2)}
.ac-item .ac-main{color:var(--text)}
.ac-item .ac-sub{color:var(--muted);font-size:11px;font-family:'DM Mono',monospace}

.opts-row{display:flex;gap:8px;align-items:center}
.go-btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;padding:11px 16px;cursor:pointer;letter-spacing:0.02em;transition:opacity .15s,transform .1s;flex:1}
.go-btn:active{transform:scale(0.98);opacity:.9}
.go-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.field-inline{display:flex;flex-direction:column;gap:4px;max-width:96px}
.add-wp{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;align-self:flex-start}
.add-wp:active{color:var(--accent)}

#map{flex:1;min-height:0;z-index:1;position:relative}

/* synthetic rain alert banner */
#alert-banner{position:absolute;top:10px;left:12px;right:12px;z-index:600;display:none;flex-direction:column;gap:6px;pointer-events:none}
#alert-banner.visible{display:flex}
.alert{background:rgba(20,20,20,0.95);backdrop-filter:blur(8px);border:0.5px solid var(--border2);border-left-width:3px;border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px}
.alert.rain{border-left-color:var(--blue);color:var(--blue)}
.alert.storm{border-left-color:var(--red);color:var(--red)}
.alert.wind{border-left-color:var(--amber);color:var(--amber)}
.alert.dry{border-left-color:var(--green);color:var(--green)}
.alert .a-icon{font-size:16px}

/* OVERVIEW cards */
#route-sheet{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:0 0 14px;display:none;flex-direction:column;pointer-events:none}
#route-sheet.visible{display:flex}
.sheet-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;padding:0 20px 8px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
#route-cards{display:flex;gap:10px;overflow-x:auto;padding:0 20px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;pointer-events:auto}
#route-cards::-webkit-scrollbar{display:none}
.route-card{flex-shrink:0;width:235px;background:rgba(20,20,20,0.95);backdrop-filter:blur(10px);border:1px solid var(--border2);border-left-width:4px;border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:transform .1s,border-color .15s}
.route-card:active{transform:scale(0.985)}
.route-card.r0{border-left-color:var(--r1)}.route-card.r1{border-left-color:var(--r2)}.route-card.r2{border-left-color:var(--r3)}
.rc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.rc-time{font-size:20px;font-weight:700;letter-spacing:-0.01em}
.rc-time .u{font-size:13px;font-weight:600;color:var(--muted)}
.rc-dist{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.rc-via{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-score-row{display:flex;align-items:center;gap:8px;padding-top:9px;border-top:0.5px solid var(--border);margin-bottom:7px}
.rc-score{display:flex;align-items:baseline;gap:4px}
.rc-score .sv{font-size:18px;font-weight:700}
.rc-score .sl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.rc-weather{display:flex;align-items:center;gap:8px}
.rc-wx-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap}
.rc-wx-icons{display:flex;gap:1px;font-size:13px;margin-left:auto}
.rc-tap{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:8px;letter-spacing:0.06em;text-align:center;opacity:0.7}
.score-good{color:var(--green)}.score-mid{color:var(--amber)}.score-bad{color:var(--red)}
.wx-dry{background:rgba(110,231,135,0.14);color:var(--green)}
.wx-light{background:rgba(92,184,255,0.14);color:var(--blue)}
.wx-mod{background:rgba(255,191,71,0.16);color:var(--amber)}
.wx-heavy{background:rgba(255,92,92,0.16);color:var(--red)}
.rc-loading{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding-top:9px;border-top:0.5px solid var(--border)}

/* DETAIL sheet */
#detail-sheet{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:0 14px 14px;display:none;pointer-events:none}
#detail-sheet.visible{display:block}
.detail-card{background:rgba(20,20,20,0.96);backdrop-filter:blur(10px);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 16px;pointer-events:auto}
.dc-back{display:inline-flex;align-items:center;gap:6px;background:var(--accent);border:none;border-radius:8px;padding:8px 14px 8px 11px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#0a0a0a;cursor:pointer;margin-bottom:12px;transition:transform .1s,opacity .15s}
.dc-back:active{transform:scale(0.97);opacity:0.9}
.dc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.dc-time{font-size:22px;font-weight:700}.dc-time .u{font-size:14px;color:var(--muted);font-weight:600}
.dc-dist{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.dc-via{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:11px}
.dc-stats{display:flex;gap:16px;padding-top:11px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.dc-stat{display:flex;flex-direction:column;gap:2px}
.dc-stat .l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.dc-stat .v{font-size:15px;font-weight:600}
.dc-stat .v.accent{color:var(--accent)}.dc-stat .v.red{color:var(--red)}.dc-stat .v.blue{color:var(--blue)}
.dc-stat .v.green{color:var(--green)}.dc-stat .v.amber{color:var(--amber)}

/* departure time slider */
.dc-slider-wrap{margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.dc-slider-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.dc-slider-head .l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.dc-slider-head .v{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent)}
input[type=range]{width:100%;-webkit-appearance:none;background:transparent;height:18px}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:var(--border2);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);margin-top:-7px;cursor:pointer}
input[type=range]::-moz-range-track{height:4px;background:var(--border2);border-radius:2px}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}

#loading{display:none;position:absolute;inset:0;background:rgba(10,10,10,0.78);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading.visible{display:flex}
.spinner{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:0.06em}

#toast{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(28,8,8,0.95);border:1px solid rgba(255,92,92,0.4);border-radius:10px;padding:12px 18px;font-family:'DM Mono',monospace;font-size:12px;color:var(--red);max-width:80%;text-align:center}
#toast.visible{display:block}

.leaflet-container{background:#111 !important;font-family:'Syne',sans-serif}
.leaflet-tile-pane{filter:brightness(0.82) saturate(0.65)}

.wm-wrap{position:relative;width:54px;height:66px}
.wm-box{position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:rgba(14,14,14,0.92);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:4px 7px 5px;display:flex;flex-direction:column;align-items:center;gap:1px;backdrop-filter:blur(6px);box-shadow:0 2px 14px rgba(0,0,0,0.6);white-space:nowrap}
.wm-box::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(255,255,255,0.18);border-bottom:none}
.wm-icon{font-size:20px;line-height:1.1}
.wm-temp{font-family:'DM Mono',monospace;font-size:11px;color:#f0ede8;font-weight:500}
.wm-pop{font-family:'DM Mono',monospace;font-size:10px;color:#5cb8ff;font-weight:500}
.wm-box.rain{border-color:rgba(92,184,255,0.55);background:rgba(8,16,28,0.93)}
.wm-box.storm{border-color:rgba(255,92,92,0.55);background:rgba(28,8,8,0.93)}
.wm-box .wm-wind{font-family:'DM Mono',monospace;font-size:9px;color:var(--amber)}

.pin-wrap{position:relative;width:32px;height:32px}
.pin{position:absolute;inset:0;border-radius:50%;background:rgba(14,14,14,0.92);border:2px solid #888;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 1px 6px rgba(0,0,0,0.55)}
.pin.r0{border-color:var(--r1)}.pin.r1{border-color:var(--r2)}.pin.r2{border-color:var(--r3)}

.dot-start,.dot-end,.dot-wp{width:13px;height:13px;border-radius:50%;border:2.5px solid #0a0a0a;box-shadow:0 0 0 1.5px rgba(255,255,255,0.25)}
.dot-start{background:#e8ff47}.dot-end{background:#ff5c5c}.dot-wp{background:#fff}

.leaflet-popup-content-wrapper{background:#141414 !important;border:0.5px solid rgba(255,255,255,0.13) !important;border-radius:10px !important;color:#f0ede8 !important;font-family:'DM Mono',monospace !important;font-size:12px !important;box-shadow:0 4px 24px rgba(0,0,0,0.65) !important;padding:0 !important}
.leaflet-popup-content{margin:10px 14px !important;line-height:1.7 !important;min-width:168px}
.leaflet-popup-tip{background:#141414 !important}
.leaflet-popup-close-button{color:rgba(255,255,255,0.35) !important;font-size:16px !important;top:6px !important;right:8px !important}
.popup-title{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;margin-bottom:7px;color:#f0ede8}
.popup-row{display:flex;justify-content:space-between;gap:20px;padding:1px 0}
.popup-label{color:rgba(240,237,232,0.42)}
.pv{font-weight:500}.pv-accent{color:#e8ff47;font-weight:500}.pv-blue{color:#5cb8ff;font-weight:500}.pv-red{color:#ff5c5c;font-weight:500}.pv-amber{color:#ffbf47;font-weight:500}

.leaflet-control-zoom{border:none !important;box-shadow:none !important;margin-top:14px !important;margin-right:12px !important}
.leaflet-control-zoom a{background:#1e1e1e !important;color:#f0ede8 !important;border:0.5px solid rgba(255,255,255,0.1) !important}
.leaflet-control-zoom a:hover{background:#2a2a2a !important}
.leaflet-control-attribution{display:none !important}

#empty-state{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:2}
.es-icon{font-size:38px;margin-bottom:8px;opacity:.28}
.es-txt{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}

#share-btn{position:absolute;top:12px;right:54px;z-index:600;background:rgba(20,20,20,0.94);backdrop-filter:blur(8px);border:0.5px solid var(--border2);border-radius:8px;width:38px;height:38px;display:none;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--text)}
#share-btn.visible{display:flex}
#share-btn:active{transform:scale(0.95)}
</style>
</head>
<body>
<div id="app">
  <div id="searchbar">
    <div class="field-row">
      <div class="field">
        <label>Partenza</label>
        <div class="input-wrap">
          <input type="text" id="origin" placeholder="Es. Milano" autocomplete="off"/>
          <button class="geo-btn" id="geo-btn" title="Usa la mia posizione">📍</button>
        </div>
        <div class="ac-list" id="ac-origin"></div>
      </div>
      <div class="sep-icon">→</div>
      <div class="field">
        <label>Destinazione</label>
        <div class="input-wrap"><input type="text" id="destination" placeholder="Es. Torino" autocomplete="off"/></div>
        <div class="ac-list" id="ac-destination"></div>
      </div>
    </div>

    <div id="wp-container"></div>
    <button class="add-wp" id="add-wp-btn">+ Aggiungi tappa intermedia</button>

    <div class="opts-row">
      <div class="field-inline"><label>Data</label><input type="date" id="dep-date"/></div>
      <div class="field-inline"><label>Ora</label><input type="time" id="dep-time"/></div>
      <div class="field-inline" style="max-width:78px"><label>Ogni</label><select id="step-km"><option value="5">5 km</option><option value="10" selected>10 km</option><option value="15">15 km</option><option value="20">20 km</option></select></div>
      <button class="go-btn" id="go-btn" onclick="computeRoute()">Cerca</button>
    </div>
  </div>

  <div id="map">
    <div id="empty-state"><div class="es-icon">🏍️</div><div class="es-txt">Inserisci il percorso</div></div>
    <div id="alert-banner"></div>
    <button id="share-btn" onclick="shareRoute()" title="Condividi">🔗</button>
    <div id="toast"></div>
  </div>

  <div id="route-sheet">
    <div class="sheet-label">Percorsi · tocca per i dettagli</div>
    <div id="route-cards"></div>
  </div>

  <div id="detail-sheet"><div class="detail-card" id="detail-card"></div></div>
</div>

<div id="loading"><div class="spinner"></div><div class="loading-txt" id="loading-txt">Calcolo percorso…</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ════════════ STATE ════════════
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([45.4,12.3],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let overviewLayers=[],detailLayers=[];
let detailMarkers=L.layerGroup().addTo(map);
let allRoutes=[];
let mode='empty';
let detailRouteIdx=-1;
let savedPins=[];
let detailLoadToken=0;
let baseDepTs=null;          // base departure for slider (slider offsets from this)
const routeColors=['#1a73e8','#8ab4f8','#aecbfa'];
const wxCache={};
const geoCache={};           // resolved geocodes: query→[lat,lon]

// init datetime
const now=new Date();now.setMinutes(now.getMinutes()+15);
document.getElementById('dep-date').value=now.toISOString().slice(0,10);
document.getElementById('dep-time').value=now.toTimeString().slice(0,5);

// ════════════ UTILS ════════════
function geodesicKm(a,b){const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180,lat1=a[0]*Math.PI/180,lat2=b[0]*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function lerp(A,B,f){return[A[0]+(B[0]-A[0])*f,A[1]+(B[1]-A[1])*f]}
function setLoading(t){document.getElementById('loading').classList.add('visible');document.getElementById('loading-txt').textContent=t}
function clearLoading(){document.getElementById('loading').classList.remove('visible')}
function showToast(msg){const t=document.getElementById('toast');t.textContent='⚠️ '+msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),4000)}
function formatTime(ts){return new Date(ts*1000).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
function formatDate(ts){return new Date(ts*1000).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}
function getBaseDepTs(){return Math.floor(new Date(`${document.getElementById('dep-date').value}T${document.getElementById('dep-time').value}:00`).getTime()/1000)}

// ════════════ GEOCODING + AUTOCOMPLETE ════════════
async function geocodeSearch(q,limit=5){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=${limit}&addressdetails=1`,{headers:{'User-Agent':'RouteCast/1.0'}});
  if(!r.ok)return[];
  return await r.json();
}
async function geocode(q){
  if(geoCache[q])return geoCache[q];
  const arr=await geocodeSearch(q,1);
  if(!arr.length)throw new Error(`Luogo non trovato: "${q}"`);
  const coord=[parseFloat(arr[0].lat),parseFloat(arr[0].lon)];
  geoCache[q]=coord;
  return coord;
}

function fmtPlace(item){
  const a=item.address||{};
  const main=item.namedetails?.name||a.amenity||a.shop||a.tourism||a.road||a.city||a.town||a.village||item.display_name.split(',')[0];
  const ctx=[a.city||a.town||a.village||a.county,a.country].filter(Boolean).join(', ');
  return{main,ctx,display:item.display_name,coord:[parseFloat(item.lat),parseFloat(item.lon)]};
}

// debounced autocomplete wiring
function wireAutocomplete(inputId,listId){
  const input=document.getElementById(inputId);
  const list=document.getElementById(listId);
  let timer=null,items=[],sel=-1;

  function hide(){list.classList.remove('visible');sel=-1}
  function render(){
    list.innerHTML='';
    items.forEach((it,i)=>{
      const div=document.createElement('div');
      div.className='ac-item'+(i===sel?' sel':'');
      div.innerHTML=`<div class="ac-main">${it.main}</div>${it.ctx?`<div class="ac-sub">${it.ctx}</div>`:''}`;
      div.onclick=()=>{input.value=it.main+(it.ctx?', '+it.ctx:'');geoCache[input.value]=it.coord;hide()};
      list.appendChild(div);
    });
    list.classList.toggle('visible',items.length>0);
  }

  input.addEventListener('input',()=>{
    const q=input.value.trim();
    clearTimeout(timer);
    if(q.length<3){hide();return}
    timer=setTimeout(async()=>{
      try{
        const raw=await geocodeSearch(q,6);
        items=raw.map(fmtPlace);
        render();
      }catch(e){hide()}
    },350); // debounce respects Nominatim rate limit
  });

  input.addEventListener('keydown',e=>{
    if(!list.classList.contains('visible')){if(e.key==='Enter')computeRoute();return}
    if(e.key==='ArrowDown'){sel=Math.min(sel+1,items.length-1);render();e.preventDefault()}
    else if(e.key==='ArrowUp'){sel=Math.max(sel-1,0);render();e.preventDefault()}
    else if(e.key==='Enter'){
      if(sel>=0){const it=items[sel];input.value=it.main+(it.ctx?', '+it.ctx:'');geoCache[input.value]=it.coord;hide();e.preventDefault()}
      else{hide();computeRoute()}
    }
    else if(e.key==='Escape')hide();
  });

  input.addEventListener('blur',()=>setTimeout(hide,200));
}

// ════════════ ROUTING ════════════
async function getRoutes(coordsList){
  // coordsList: [[lat,lon],...] origin,...waypoints,dest
  const coordStr=coordsList.map(c=>`${c[1]},${c[0]}`).join(';');
  const url=`https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson&alternatives=true&steps=true`;
  const r=await fetch(url);const d=await r.json();
  if(!d.routes?.length)throw new Error('Nessun percorso trovato');
  return d.routes.slice(0,3).map((route,i)=>{
    const coords=route.geometry.coordinates.map(([lon,lat])=>[lat,lon]);
    let via='';
    try{const names=route.legs.flatMap(l=>l.steps).map(s=>s.name).filter(n=>n&&n.length>2);const c={};names.forEach(n=>c[n]=(c[n]||0)+1);via=Object.keys(c).sort((a,b)=>c[b]-c[a])[0]||''}catch(e){}
    return{coords,distanceKm:route.distance/1000,durationSec:route.duration,via};
  });
}
function estimateRidingDuration(s){return s/0.85}

function resampleRoute(coords,totalKm,totalSec,stepKm){
  const points=[],times=[];
  points.push(coords[0]);times.push(0);
  let target=stepKm,cum=0;
  for(let i=0;i<coords.length-1;i++){
    const A=coords[i],B=coords[i+1],seg=geodesicKm(A,B);if(!seg)continue;
    while(cum+seg>=target){const need=target-cum,frac=Math.max(0,Math.min(1,need/seg));points.push(lerp(A,B,frac));times.push((target/totalKm)*totalSec);target+=stepKm}
    cum+=seg;
  }
  points.push(coords[coords.length-1]);times.push(totalSec);
  if(points.length===2){const mid=coords[Math.floor(coords.length/2)];points.splice(1,0,mid);times.splice(1,0,totalSec/2)}
  return{points,times};
}

// ════════════ WEATHER ════════════
async function getWeatherAt(lat,lon,unixTs){
  const key=`${lat.toFixed(2)}_${lon.toFixed(2)}`;
  if(!wxCache[key]){
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,weathercode,windspeed_10m,windgusts_10m&forecast_days=7&timezone=auto`;
    const r=await fetch(url);if(!r.ok)throw new Error(`Open-Meteo ${r.status}`);
    wxCache[key]=await r.json();
  }
  const d=wxCache[key],target=unixTs*1000;let bi=0,bd=Infinity;
  d.hourly.time.forEach((t,i)=>{const diff=Math.abs(new Date(t).getTime()-target);if(diff<bd){bd=diff;bi=i}});
  return{
    temp:Math.round(d.hourly.temperature_2m[bi]),
    feels:Math.round(d.hourly.apparent_temperature[bi]),
    pop:d.hourly.precipitation_probability[bi]??0,
    wind:Math.round(d.hourly.windspeed_10m[bi]),
    gust:Math.round(d.hourly.windgusts_10m[bi]),
    precip:d.hourly.precipitation[bi]??0,
    wcode:d.hourly.weathercode[bi]
  };
}

function wxFromCode(wc){
  if(wc===0)return{emoji:'☀️',label:'Sereno',sev:0};
  if(wc<=2)return{emoji:'🌤️',label:'Poco nuvoloso',sev:0};
  if(wc===3)return{emoji:'☁️',label:'Coperto',sev:0};
  if(wc<=49)return{emoji:'🌫️',label:'Nebbia',sev:1};
  if(wc<=57)return{emoji:'🌦️',label:'Pioggerella',sev:1};
  if(wc<=67)return{emoji:'🌧️',label:'Pioggia',sev:2};
  if(wc<=77)return{emoji:'❄️',label:'Neve',sev:2};
  if(wc<=82)return{emoji:'🌧️',label:'Rovesci',sev:2};
  if(wc<=84)return{emoji:'🌨️',label:'Neve intensa',sev:2};
  if(wc<=99)return{emoji:'⛈️',label:'Temporale',sev:3};
  return{emoji:'🌡️',label:'—',sev:0};
}

// Driveability score 0-100: penalise rain prob, severity, wind gusts, cold/heat
function driveScore(samples){
  if(!samples.length)return{score:100,cls:'score-good'};
  let penalty=0;
  samples.forEach(s=>{
    penalty+=s.pop*0.25;                          // rain probability
    penalty+=s.sev*12;                            // weather severity
    if(s.gust>40)penalty+=(s.gust-40)*0.8;        // strong gusts
    if(s.feels<5)penalty+=(5-s.feels)*1.5;        // cold
    if(s.feels>35)penalty+=(s.feels-35)*1.2;      // heat
  });
  const avg=penalty/samples.length;
  const score=Math.max(0,Math.min(100,Math.round(100-avg)));
  const cls=score>=70?'score-good':score>=45?'score-mid':'score-bad';
  return{score,cls};
}

// Analyse a route: sparse sampling → summary + pins + score + alert
async function analyseRoute(route,idx,depTs){
  const ridingSec=estimateRidingDuration(route.durationSec);
  const panoStep=Math.max(20,route.distanceKm/6);
  const{points,times}=resampleRoute(route.coords,route.distanceKm,ridingSec,panoStep);
  let maxPop=0,maxSev=0,worstLabel='Sereno',worstEmoji='☀️',maxGust=0;
  const emojiSet=[],pins=[],samples=[];
  let firstRain=null,arrEmoji='☀️';
  for(let i=0;i<points.length;i++){
    try{
      const wx=await getWeatherAt(points[i][0],points[i][1],depTs+Math.round(times[i]));
      samples.push(wx);
      const{sev,label,emoji}=wxFromCode(wx.wcode);
      if(wx.pop>maxPop)maxPop=wx.pop;
      if(wx.gust>maxGust)maxGust=wx.gust;
      if(sev>maxSev){maxSev=sev;worstLabel=label;worstEmoji=emoji}
      if(sev>=2&&!firstRain){firstRain={km:Math.round((times[i]/ridingSec)*route.distanceKm),time:formatTime(depTs+Math.round(times[i])),label,emoji,sev}}
      emojiSet.push(emoji);
      if(i===points.length-1)arrEmoji=emoji;        // arrival weather icon
      if(i>0&&i<points.length-1)pins.push({P:points[i],emoji,idx});
    }catch(e){}
  }
  const compactEmojis=[...new Set(emojiSet)].slice(0,4);
  let tierLabel,tierClass;
  if(maxSev>=3){tierLabel='Temporali';tierClass='wx-heavy'}
  else if(maxSev>=2||maxPop>=60){tierLabel='Pioggia';tierClass='wx-mod'}
  else if(maxSev>=1||maxPop>=30){tierLabel='Pioggia leggera';tierClass='wx-light'}
  else{tierLabel='Asciutto';tierClass='wx-dry'}
  const{score,cls}=driveScore(samples);
  return{tierLabel,tierClass,maxPop,maxGust,worstLabel,worstEmoji,compactEmojis,pins,score,scoreCls:cls,firstRain,arrEmoji};
}

async function loadDetailMarkers(points,times,depTs,totalKm,totalSec){
  const myToken=++detailLoadToken;
  let firstRain=null,maxGust=0,gustKm=0,gustTime='';
  for(let i=0;i<points.length;i++){
    if(mode!=='detail'||myToken!==detailLoadToken)return;
    const P=points[i],tsHere=depTs+Math.round(times[i]),kmHere=Math.round((times[i]/totalSec)*totalKm);
    let wx;try{wx=await getWeatherAt(P[0],P[1],tsHere)}catch(e){continue}
    const{emoji,label,sev}=wxFromCode(wx.wcode);
    if(sev>=2&&!firstRain)firstRain={km:kmHere,time:formatTime(tsHere),label,emoji,sev};
    if(wx.gust>maxGust){maxGust=wx.gust;gustKm=kmHere;gustTime=formatTime(tsHere)}
    const sevClass=sev>=3?'storm':sev>=1?'rain':'';
    const windWarn=wx.gust>40;
    const html=`<div class="wm-wrap"><div class="wm-box ${sevClass}"><div class="wm-icon">${emoji}</div><div class="wm-temp">${wx.temp}°C</div>${wx.pop>15?`<div class="wm-pop">${wx.pop}%</div>`:''}${windWarn?`<div class="wm-wind">💨${wx.gust}</div>`:''}</div></div>`;
    const icon=L.divIcon({html,className:'',iconSize:[54,66],iconAnchor:[27,66]});
    const popupHtml=`<div class="popup-title">${emoji} ${label}</div><div class="popup-row"><span class="popup-label">Km percorso</span><span class="pv-accent">${kmHere} km</span></div><div class="popup-row"><span class="popup-label">ETA</span><span class="pv">${formatTime(tsHere)}</span></div><div class="popup-row"><span class="popup-label">Temperatura</span><span class="pv">${wx.temp}°C</span></div><div class="popup-row"><span class="popup-label">Percepita</span><span class="pv">${wx.feels}°C</span></div><div class="popup-row"><span class="popup-label">Prob. pioggia</span><span class="pv-blue">${wx.pop}%</span></div><div class="popup-row"><span class="popup-label">Vento</span><span class="pv">${wx.wind} km/h</span></div><div class="popup-row"><span class="popup-label">Raffiche</span><span class="${windWarn?'pv-amber':'pv'}">${wx.gust} km/h</span></div>${wx.precip>0?`<div class="popup-row"><span class="popup-label">Precipit.</span><span class="pv-blue">${wx.precip} mm</span></div>`:''}`;
    L.marker(P,{icon,zIndexOffset:sev*100}).bindPopup(popupHtml).addTo(detailMarkers);
  }
  if(myToken===detailLoadToken)updateAlertBanner(firstRain,maxGust,gustKm,gustTime);
}

function updateAlertBanner(firstRain,maxGust,gustKm,gustTime){
  const banner=document.getElementById('alert-banner');
  banner.innerHTML='';
  let any=false;
  if(firstRain){
    any=true;
    const cls=firstRain.sev>=3?'storm':'rain';
    const div=document.createElement('div');div.className='alert '+cls;
    div.innerHTML=`<span class="a-icon">${firstRain.emoji}</span><span>${firstRain.label} prevista al km ${firstRain.km} verso le ${firstRain.time}</span>`;
    banner.appendChild(div);
  }
  if(maxGust>50){
    any=true;
    const div=document.createElement('div');div.className='alert wind';
    div.innerHTML=`<span class="a-icon">💨</span><span>Raffiche fino a ${maxGust} km/h al km ${gustKm} (${gustTime})</span>`;
    banner.appendChild(div);
  }
  if(!any){
    const div=document.createElement('div');div.className='alert dry';
    div.innerHTML=`<span class="a-icon">✓</span><span>Nessuna pioggia prevista sul percorso</span>`;
    banner.appendChild(div);
  }
  banner.classList.add('visible');
}

function shareRoute(){
  const params=new URLSearchParams();
  params.set('da',document.getElementById('origin').value);
  params.set('a',document.getElementById('destination').value);
  params.set('data',document.getElementById('dep-date').value);
  params.set('ora',document.getElementById('dep-time').value);
  params.set('ogni',document.getElementById('step-km').value);
  const url=location.origin+location.pathname+'?'+params.toString();
  if(navigator.share){
    navigator.share({title:'RouteCast',text:'Il mio percorso con meteo',url}).catch(()=>{});
  }else{
    navigator.clipboard?.writeText(url).then(()=>showToast('Link copiato!'),()=>showToast(url));
  }
}

function loadFromUrl(){
  const p=new URLSearchParams(location.search);
  if(p.get('da'))document.getElementById('origin').value=p.get('da');
  if(p.get('a'))document.getElementById('destination').value=p.get('a');
  if(p.get('data'))document.getElementById('dep-date').value=p.get('data');
  if(p.get('ora'))document.getElementById('dep-time').value=p.get('ora');
  if(p.get('ogni'))document.getElementById('step-km').value=p.get('ogni');
  if(p.get('da')&&p.get('a'))setTimeout(computeRoute,400);
}

// ════════════ MAIN ════════════
async function computeRoute(){
  const o=document.getElementById('origin').value.trim(),d=document.getElementById('destination').value.trim();
  if(!o||!d){showToast('Inserisci partenza e destinazione');return}
  clearOverview();clearDetail();allRoutes=[];savedPins=[];detailRouteIdx=-1;arrivalPin=null;
  Object.keys(wxCache).forEach(k=>delete wxCache[k]);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('route-sheet').classList.remove('visible');
  document.getElementById('detail-sheet').classList.remove('visible');
  document.getElementById('alert-banner').classList.remove('visible');
  document.getElementById('go-btn').disabled=true;

  try{
    setLoading('Ricerca indirizzi…');
    // resolve origin, waypoints, destination
    const wpInputs=[...document.querySelectorAll('#wp-container input')].map(el=>el.value.trim()).filter(Boolean);
    const queries=[o,...wpInputs,d];
    const coordsList=[];
    for(const q of queries){coordsList.push(await geocode(q))}

    setLoading('Calcolo percorsi alternativi…');
    allRoutes=await getRoutes(coordsList);

    buildCards();
    renderOverview();
    clearLoading();

    const depTs=getBaseDepTs();
    arrivalPin=null;
    for(let i=0;i<allRoutes.length;i++){
      const s=await analyseRoute(allRoutes[i],i,depTs);
      allRoutes[i].summary=s;
      fillCardWeather(i,s);
      if(mode==='overview')addPanoramaPins(s.pins);
      savedPins=savedPins.concat(s.pins);
      if(i===0){
        const r=allRoutes[0];
        arrivalPin={coord:r.coords[r.coords.length-1],emoji:s.arrEmoji};
        if(mode==='overview')addArrivalPin();
      }
    }
  }catch(e){
    clearLoading();showToast(e.message);
    document.getElementById('empty-state').style.display='';
  }finally{
    document.getElementById('go-btn').disabled=false;
  }
}

// step dropdown live refresh
document.getElementById('step-km').addEventListener('change',()=>{if(mode==='detail')refreshDetailMarkers()});

// android/browser back
window.addEventListener('popstate',()=>{if(mode==='detail')backToOverview()});

// PWA service worker (inline, optional caching)
if('serviceWorker' in navigator){
  const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{});`;
  const blob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// load shared URL params on startup
loadFromUrl();
</script>
